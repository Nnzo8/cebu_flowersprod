<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
  <div class="w-full max-w-md bg-white rounded-lg shadow-sm p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-semibold text-slate-800">Sign In</h1>
      <p class="text-slate-600 mt-2">Welcome back to our flower boutique</p>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Error Message Alert -->
      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
          <p class="text-red-600 text-sm font-medium">{{ errorMessage() }}</p>
        </div>
      }

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-slate-800 mb-2">
          Email Address
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-slate-200 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition"
          [class.border-red-500]="submitted && email?.invalid"
        />
        <div *ngIf="submitted && email?.invalid" class="text-red-500 text-sm mt-1">
          <p *ngIf="email?.errors?.['required']">Email is required</p>
          <p *ngIf="email?.errors?.['email']">Please enter a valid email</p>
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-slate-800 mb-2">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full px-4 py-2 border border-slate-200 rounded-lg text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition"
          [class.border-red-500]="submitted && password?.invalid"
        />
        <div *ngIf="submitted && password?.invalid" class="text-red-500 text-sm mt-1">
          <p *ngIf="password?.errors?.['required']">Password is required</p>
          <p *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</p>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full bg-pink-500 hover:bg-pink-600 disabled:bg-pink-400 disabled:cursor-not-allowed text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
      >
        @if (isLoading()) {
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-200"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-slate-600">Or continue with</span>
      </div>
    </div>

    <!-- Google Sign-In Button -->
    <button
      type="button"
      class="w-full border border-slate-300 bg-white hover:bg-slate-50 text-slate-800 font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- Footer Link -->
    <div class="mt-8 text-center">
      <p class="text-slate-600">
        Don't have an account?
        <a routerLink="../register" class="text-pink-500 hover:text-pink-600 font-semibold transition">
          Sign up
        </a>
      </p>
    </div>
  </div>
</div>
