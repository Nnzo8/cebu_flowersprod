<app-navbar></app-navbar>

<section class="bg-white min-h-screen py-16 md:py-24 animate-fade-in-up">
  <div class="max-w-3xl mx-auto px-4 text-center">
    
    <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-4 tracking-tight">
      Let's Connect
    </h1>
    <p class="text-lg text-slate-500 mb-12 max-w-lg mx-auto">
      Have a question about an arrangement or want to discuss a custom order? Feel free to reach out.
    </p>

    <div class="bg-slate-50 rounded-3xl p-8 mb-12 border border-slate-100 transition-all duration-300 hover:shadow-md animate-scale-in">
      <div class="w-20 h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-bold shadow-sm">
        {{ ownerName.charAt(0) }}
      </div>
      
      <h2 class="text-2xl font-bold text-slate-900">{{ ownerName }}</h2>
      
      <div class="flex items-center justify-center gap-2 text-slate-500 mt-2 font-medium">
        <svg class="w-5 h-5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
        <span>{{ ownerLocation }}</span>
      </div>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 md:gap-6">
      @for (link of socialLinks; track link.label) {
        <a
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="link.ariaLabel"
          class="group flex flex-col items-center justify-center p-8 bg-white rounded-2xl border border-slate-200 hover:border-rose-400 hover:shadow-xl transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:ring-offset-2 hover:-translate-y-1"
        >
          <div 
            class="text-slate-400 group-hover:text-rose-500 transition-colors duration-300 mb-4"
            [innerHTML]="getSvgIcon(link.icon)"
          ></div>
          
          <span class="font-semibold text-slate-600 group-hover:text-slate-900 transition-colors">
            {{ link.label }}
          </span>
        </a>
      }
    </div>
    
  </div>
</section>
